name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation without npm publish"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Validate trusted publishing runtime
        run: |
          node -e "const semver=(v)=>v.replace(/^v/,'').split('.').map(Number); const [major,minor,patch]=semver(process.version); if (major < 22 || (major === 22 && (minor < 14 || (minor === 14 && patch < 0)))) { console.error('trusted publishing requires Node >=22.14.0'); process.exit(1); }"
          node -e "const cp=require('child_process'); const version=cp.execSync('npm --version').toString().trim(); const [major,minor,patch]=version.split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { console.error('trusted publishing requires npm >=11.5.1'); process.exit(1); }"

      - name: Validate event and package metadata
        env:
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('packages/cli/package.json','utf8')); const event=process.env.GITHUB_EVENT_NAME || ''; const tag=process.env.GITHUB_REF_NAME || ''; const dryRun=process.env.DRY_RUN_INPUT || ''; if (event === 'push') { if (!tag.startsWith('cli-v')) { console.error('publish-cli push requires cli-v* tag'); process.exit(1); } if (tag !== 'cli-v' + pkg.version) { console.error('tag must match packages/cli version'); process.exit(1); } } else if (event === 'workflow_dispatch') { if (dryRun !== 'true') { console.error('workflow_dispatch is dry-run only; dry_run must be true'); process.exit(1); } } else { console.error('publish-cli only supports push tags and workflow_dispatch dry-run'); process.exit(1); } if (pkg.repository?.url !== 'git+https://github.com/Ainsiel/Gridwork.git') { console.error('repository.url must match Ainsiel/Gridwork for trusted publishing'); process.exit(1); } if (pkg.bin?.gridwork !== 'dist/index.js') { console.error('bin.gridwork must point to dist/index.js'); process.exit(1); } for (const script of ['preinstall','install','postinstall']) { if (pkg.scripts?.[script]) { console.error('install lifecycle scripts are forbidden'); process.exit(1); } }"

      - name: Validate official factory source
        run: |
          node -e "const fs=require('fs'); const constants=fs.readFileSync('packages/cli/src/init/constants.ts','utf8'); if (!constants.includes('DEFAULT_FACTORY_SOURCE = \"Ainsiel/Gridwork\"')) { console.error('DEFAULT_FACTORY_SOURCE must be Ainsiel/Gridwork'); process.exit(1); } if (constants.includes('DEFAULT_FACTORY_SOURCE = \"gridwork/gridwork\"')) { console.error('DEFAULT_FACTORY_SOURCE is still the placeholder'); process.exit(1); }"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack dry-run
        run: npm pack -w packages/cli --dry-run

      - name: Resolve npm dist-tag
        id: dist-tag
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('packages/cli/package.json','utf8')); const distTag=pkg.version.includes('-') ? 'next' : 'latest'; fs.appendFileSync(process.env.GITHUB_OUTPUT, 'dist_tag=' + distTag + '\n');"

      - name: Publish
        if: ${{ github.event_name == 'push' }}
        run: npm publish -w packages/cli --access public --tag ${{ steps.dist-tag.outputs.dist_tag }}
