name: _integration-ci

on:
  workflow_call:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: make compose-validate
      - name: Run integration tests
        run: make integration-test
      - name: Run end-to-end tests
        run: make e2e-test
